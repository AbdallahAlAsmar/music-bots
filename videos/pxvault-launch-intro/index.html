<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #f8fafc;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .bg-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.4) saturate(0.95);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1080"
      data-height="1920"
    >
      <video
        id="el-bg-video"
        class="bg-video"
        src="assets/bg-loop.mp4"
        muted
        playsinline
        preload="auto"
        data-start="0"
        data-duration="10"
        data-track-index="-1"
      ></video>

      <div
        id="el-01-hook-title"
        class="scene"
        data-composition-id="01-hook-title"
        data-composition-src="compositions/frames/01-hook-title.html"
        data-start="0"
        data-duration="3.5"
        data-track-index="0"
      ></div>

      <div
        id="el-02-value-collage"
        class="scene"
        data-composition-id="02-value-collage"
        data-composition-src="compositions/frames/02-value-collage.html"
        data-start="3"
        data-duration="4.5"
        data-track-index="1"
      ></div>

      <div
        id="el-03-cta"
        class="scene"
        data-composition-id="03-cta"
        data-composition-src="compositions/frames/03-cta.html"
        data-start="7"
        data-duration="3"
        data-track-index="0"
      ></div>

      <!-- BGM -->
      <audio
        id="el-bgm"
        src="assets/bgm/subtle.mp3"
        data-start="0"
        data-duration="10"
        data-track-index="11"
        data-volume="0.18"
      ></audio>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-01-hook-title", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 3);
        tl.fromTo("#el-02-value-collage", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 3);
        tl.to("#el-02-value-collage", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 7);
        tl.fromTo("#el-03-cta", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 7);
        tl.to({}, { duration: 10 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
